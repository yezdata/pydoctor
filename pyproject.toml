[tool.uv.workspace]
members = [
    "packages/pydoctor-cli",
    "packages/pydoctor-model-pipeline",
    "packages/pydoctor-shared-cst",
]

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.uv.sources]
torch = [
    { index = "pytorch-cu130", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
     
[tool.pyright]
exclude = [
    ".venv",
    "**/__pycache__",
    "data"
]



[dependency-groups]
dev = [
    "ipykernel>=7.3.0",
    "matplotlib>=3.11.0",
]