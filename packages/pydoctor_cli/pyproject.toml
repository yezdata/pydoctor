[project]
name = "pydoctor-cli"
version = "0.1.0"
requires-python = ">=3.12,<3.13"
dependencies = [
    "llama-cpp-python>=0.3.33",
    "pathspec>=1.1.1",
    "pydoctor-shared-cst",
    "requests>=2.34.2",
]

[[tool.uv.index]]
name = "llama-cpp-cpu"
url = "https://abetlen.github.io/llama-cpp-python/whl/cpu"
explicit = true

[tool.uv.sources]
llama-cpp-python = [
    { index = "llama-cpp-cpu", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pydoctor_cli"]


[project.scripts]
run_cli = "pydoctor_cli.cli:main"
