[project]
name = "pydoctor-cli"
version = "0.1.0"
requires-python = ">=3.12,<3.13"
dependencies = [
    "llama-cpp-python>=0.3.33",
    "pathspec>=1.1.1",
    "pydoctor-shared-cst",
]


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pydoctor_cli"]


[project.scripts]
run_cli = "pydoctor_cli.cli:main"
