[project]
name = "pydoctor-pipeline"
version = "0.1.0"
requires-python = ">=3.12,<3.13"
dependencies = [
    "pydoctor-core",
    "accelerate>=1.14.0",
    "datasets>=5.0.0",
    "peft>=0.19.1",
    "pydantic>=2.13.4",
    "pydantic-settings>=2.14.1",
    "requests>=2.34.2",
    "torch>=2.12.0",
    "tqdm>=4.68.2",
    "transformers>=5.13.0",
]

[tool.uv.scripts]
prepare_pretrain = "python src/pydoctor_model_pipeline/data_prep/prepare_pretrain_data.py"

generate_synthetic = "python src/pydoctor_model_pipeline/synthetic_data_prep/generate_synthetic_docstrings.py"
prepare_instruct_finetune = "python src/pydoctor_model_pipeline/synthetic_data_prep/prepare_instruct_finetune_synthetic.py"
prepare_finetune = "python src/pydoctor_model_pipeline/synthetic_data_prep/prepare_finetune_synthetic.py"

run_pretrain = "python src/pydoctor_model_pipeline/training/pretrain.py"
run_finetune = "python src/pydoctor_model_pipeline/training/finetune.py"