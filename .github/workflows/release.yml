name: Build and Release pydoctor-cli

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }} - ${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            backend: cpu
            artifact_name: pydoctor-windows-amd64-cpu
            binary_src: dist/cli.exe
            binary_dst: pydoctor-windows-amd64-cpu.exe

          - os: windows-latest
            backend: cuda
            artifact_name: pydoctor-windows-amd64-cuda
            binary_src: dist/cli.exe
            binary_dst: pydoctor-windows-amd64-nvidia.exe

          - os: ubuntu-latest
            backend: cpu
            artifact_name: pydoctor-linux-x86_64-cpu
            binary_src: dist/cli.bin
            binary_dst: pydoctor-linux-x86_64-cpu

          - os: ubuntu-latest
            backend: cuda
            artifact_name: pydoctor-linux-x86_64-cuda
            binary_src: dist/cli.bin
            binary_dst: pydoctor-linux-x86_64-nvidia

          - os: macos-latest
            backend: metal
            artifact_name: pydoctor-macos-arm64
            binary_src: dist/cli.bin
            binary_dst: pydoctor-macos-arm64


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and configure uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true 

      - name: Export requirements.txt
        run: uv export --package pydoctor-cli --no-hashes --no-editable --output-file requirements.txt

      - name: Install Dependencies
        shell: bash
        run: |
          uv pip install --system "Nuitka[onefile]"

          if [ "${{ matrix.backend }}" = "cuda" ]; then
            uv pip install --system nvidia-cuda-runtime-cu12 nvidia-cublas-cu12
            uv pip install --system -r requirements.txt --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cu124

          elif [ "${{ matrix.backend }}" = "metal" ]; then
            export CMAKE_ARGS="-DGGML_METAL=on"
            uv pip install --system -r requirements.txt

          else
            uv pip install --system -r requirements.txt --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu
          fi

          uv pip install --system --no-deps ./packages/pydoctor_shared_cst
          uv pip install --system --no-deps ./packages/pydoctor_cli

      - name: Setup Nuitka Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~/.ccache
            ~/AppData/Local/Nuitka/Nuitka
            ~/AppData/Local/Nuitka/Nuitka/ccache
          key: nuitka-${{ runner.os }}-${{ matrix.backend }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            nuitka-${{ runner.os }}-${{ matrix.backend }}-

      - name: Run Nuitka compilation
        shell: bash
        run: |
          SITE_PACKAGES=$(python -c "import sysconfig; print(sysconfig.get_paths()['purelib'])")
          echo "Site packages path: $SITE_PACKAGES"

          CLI_SCRIPT="packages/pydoctor_cli/src/pydoctor_cli/cli.py"

          if [ "${{ matrix.backend }}" = "cuda" ]; then
            if [ "${{ matrix.os }}" = "windows-latest" ]; then
              python -m nuitka \
                  --standalone \
                  --onefile \
                  --include-data-dir="$SITE_PACKAGES/nvidia/cuda_runtime=nvidia/cuda_runtime" \
                  --include-data-dir="$SITE_PACKAGES/nvidia/cublas=nvidia/cublas" \
                  --lto=no \
                  --low-memory \
                  --enable-plugin=anti-bloat \
                  --assume-yes-for-downloads \
                  --output-dir=dist \
                  $CLI_SCRIPT
              else 
                python -m nuitka \
                  --standalone \
                  --onefile \
                  --include-data-dir="$SITE_PACKAGES/nvidia/cuda_runtime/lib=." \
                  --include-data-dir="$SITE_PACKAGES/nvidia/cublas/lib=." \
                  --enable-plugin=anti-bloat \
                  --assume-yes-for-downloads \
                  --output-dir=dist \
                  $CLI_SCRIPT
              fi
          else
            if [ "${{ matrix.os }}" = "windows-latest" ]; then
              python -m nuitka \
                  --standalone \
                  --onefile \
                  --lto=no \
                  --low-memory \
                  --enable-plugin=anti-bloat \
                  --assume-yes-for-downloads \
                  --output-dir=dist \
                  $CLI_SCRIPT
            else
              python -m nuitka \
                  --standalone \
                  --onefile \
                  --enable-plugin=anti-bloat \
                  --assume-yes-for-downloads \
                  --output-dir=dist \
                  $CLI_SCRIPT
            fi
          fi


      - name: Rename binary for release
        shell: bash
        run: mv ${{ matrix.binary_src }} ${{ matrix.binary_dst }}

      - name: Upload temporary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_dst }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
