name: Build and Release pydoctor-cli

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            backend: cpu
            artifact_name: pydoctor-windows-amd64-cpu
            binary_src: dist/cli.exe
            binary_dst: pydoctor-windows-amd64-cpu.exe

          - os: windows-latest
            backend: cuda
            artifact_name: pydoctor-windows-amd64-cuda
            binary_src: dist/cli.exe
            binary_dst: pydoctor-windows-amd64-cuda.exe

          - os: ubuntu-latest
            backend: cpu
            artifact_name: pydoctor-linux-x86_64-cpu
            binary_src: dist/cli.bin
            binary_dst: pydoctor-linux-x86_64-cpu

          - os: ubuntu-latest
            backend: cuda
            artifact_name: pydoctor-linux-x86_64-cuda
            binary_src: dist/cli.bin
            binary_dst: pydoctor-linux-x86_64-cuda

          - os: macos-latest
            backend: metal
            artifact_name: pydoctor-macos-arm64
            binary_src: dist/cli.bin
            binary_dst: pydoctor-macos-arm64


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and configure uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true 

      - name: Export requirements.txt
        run: uv export --package pydoctor-cli --output-file requirements.txt

      - name: Install Dependencies
        shell: bash
        run: |
          if [ "${{ matrix.backend }}" = "cuda" ]; then
            uv pip install --system nvidia-cuda-runtime-cu12 nvidia-cublas-cu12
            export CMAKE_ARGS="-DGGML_CUDA=on"
          elif [ "${{ matrix.backend }}" = "metal" ]; then
            export CMAKE_ARGS="-DGGML_METAL=on"
          else
            export CMAKE_ARGS=""
          fi

          uv pip install --system "Nuitka[onefile]"
          uv pip install --system -r requirements.txt

      - name: Run Nuitka compilation
        shell: bash
        run: |
          export PYTHONPATH="packages/pydoctor_cli/src:packages/pydoctor_shared_cst/src"

          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          echo "Site packages path: $SITE_PACKAGES"

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            PYTHON_EXE=".venv/Scripts/python.exe"
          else
            PYTHON_EXE=".venv/bin/python"
          fi

          if [ "${{ matrix.backend }}" = "cuda" ]; then
            if [ "${{ matrix.os }}" = "windows-latest" ]; then
              $PYTHON_EXE -m nuitka \
                  --standalone \
                  --onefile \
                  --include-data-files="$SITE_PACKAGES/nvidia/cuda_runtime/bin/cudart64_*.dll=." \
                  --include-data-files="$SITE_PACKAGES/nvidia/cublas/bin/cublas64_*.dll=." \
                  --include-data-files="$SITE_PACKAGES/nvidia/cublas/bin/cublasLt64_*.dll=." \
                  --enable-plugin=anti-bloat \
                  --assume-yes-for-downloads \
                  --output-dir=dist \
                  packages/pydoctor_cli/src/pydoctor_cli/cli.py
              else 
                $PYTHON_EXE -m nuitka \
                  --standalone \
                  --onefile \
                  --include-data-files="$SITE_PACKAGES/nvidia/cuda_runtime/lib/libcudart.so*=." \
                  --include-data-files="$SITE_PACKAGES/nvidia/cublas/lib/libcublas.so*=." \
                  --include-data-files="$SITE_PACKAGES/nvidia/cublas/lib/libcublasLt.so*=." \
                  --enable-plugin=anti-bloat \
                  --assume-yes-for-downloads \
                  --output-dir=dist \
                  packages/pydoctor_cli/src/pydoctor_cli/cli.py
              fi
          else
            $PYTHON_EXE -m nuitka \
                --standalone \
                --onefile \
                --enable-plugin=anti-bloat \
                --assume-yes-for-downloads \
                --output-dir=dist \
                packages/pydoctor_cli/src/pydoctor_cli/cli.py
          fi


      - name: Rename binary for release
        shell: bash
        run: mv ${{ matrix.binary_src }} ${{ matrix.binary_dst }}

      - name: Upload temporary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_dst }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
