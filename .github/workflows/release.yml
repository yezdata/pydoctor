name: Build and Release pydoctor-cli

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }} - ${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            backend: cpu
            artifact_name: pydoctor-windows-amd64
            binary_src: dist/cli.exe
            binary_dst: pydoctor-windows-amd64.exe

          - os: ubuntu-latest
            backend: cpu
            artifact_name: pydoctor-linux-x86_64
            binary_src: dist/cli.bin
            binary_dst: pydoctor-linux-x86_64

          - os: macos-latest
            backend: metal
            artifact_name: pydoctor-macos-arm64
            binary_src: dist/cli.bin
            binary_dst: pydoctor-macos-arm64


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pagefile
        if: matrix.os == 'windows-latest'
        uses: al-cheb/configure-pagefile-action@v1.4
        with:
          minimum-size: 16GB
          maximum-size: 32GB

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and configure uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true 

      - name: Export requirements.txt
        run: uv export --package pydoctor-cli --no-hashes --no-editable --output-file requirements.txt

      - name: Install Dependencies
        shell: bash
        run: |
          uv pip install --system "Nuitka[onefile]"

          if [ "${{ matrix.backend }}" = "metal" ]; then
            echo "CMAKE_ARGS=-DGGML_METAL=on" >> $GITHUB_ENV
            export CMAKE_ARGS="-DGGML_METAL=on"

            uv pip install --system --no-binary llama-cpp-python -r requirements.txt

          else
            uv pip install --system -r requirements.txt --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu
          fi

          uv pip install --system --no-deps ./packages/pydoctor_shared_cst
          uv pip install --system --no-deps ./packages/pydoctor_cli

      - name: Install Build Dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache

      - name: Create Nuitka cache directories (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p ~/.cache/Nuitka
          mkdir -p ~/.ccache

      - name: Setup Nuitka Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~/.ccache
            ~/Library/Caches/Nuitka
            ~/AppData/Local/Nuitka/Nuitka
            ~/AppData/Local/Nuitka/Nuitka/ccache

          key: nuitka-${{ runner.os }}-${{ matrix.backend }}-${{ hashFiles('requirements.txt') }}
          restore-keys: nuitka-${{ runner.os }}-${{ matrix.backend }}-

      - name: Run Nuitka compilation
        shell: bash
        run: |
          CLI_SCRIPT="packages/pydoctor_cli/src/pydoctor_cli/cli.py"

          python -m nuitka \
              --standalone \
              --onefile \
              --onefile-cache-mode=cached \
              --company-name="pydoctor" \
              --product-name="src" \
              --product-version="1.0.1" \
              --enable-plugin=anti-bloat \
              --assume-yes-for-downloads \
              --output-dir=dist \
              $CLI_SCRIPT

      - name: Rename binary for release
        shell: bash
        run: mv ${{ matrix.binary_src }} ${{ matrix.binary_dst }}

      - name: Upload temporary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_dst }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare install scripts for release
        run: |
          cp scripts/install.sh artifacts/install.sh
          cp scripts/install.ps1 artifacts/install.ps1

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
