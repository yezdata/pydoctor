tokenizer:
  name: "HuggingFaceTB/SmolLM2-1.7B-Instruct"
  eos_token: "<|endoftext|>"
  spec_tokens:
    docstring_start_token: null

finetune:
  tokenized_ds_dir: "/kaggle/input/datasets/vclavje/tokenized-synthetic--codeparrot-instruct-FINAL"
  lr: 2e-4
  lr_warmup: 0.05
  weight_decay: 0.01
  batch_size: 8
  gradient_accumulation_steps: 8
  num_epochs: 1

